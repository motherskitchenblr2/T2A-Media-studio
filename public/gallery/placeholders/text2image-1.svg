<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <rect width="600" height="400" fill="#0a0a0f"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Skyline -->
  <rect x="80" y="180" width="40" height="120" rx="3" fill="#1e1e2e" opacity="0.8"/>
  <rect x="130" y="140" width="45" height="160" rx="3" fill="#1a1a2e" opacity="0.9"/>
  <rect x="185" y="200" width="35" height="100" rx="3" fill="#1e1e2e" opacity="0.7"/>
  <rect x="230" y="120" width="30" height="180" rx="3" fill="#16162e"/>
  <rect x="270" y="170" width="50" height="130" rx="3" fill="#1a1a2e" opacity="0.85"/>
  <rect x="330" y="220" width="40" height="80" rx="3" fill="#1e1e2e" opacity="0.7"/>
  <rect x="380" y="150" width="55" height="150" rx="3" fill="#16162e"/>
  <rect x="445" y="190" width="35" height="110" rx="3" fill="#1a1a2e" opacity="0.8"/>
  <rect x="490" y="210" width="45" height="90" rx="3" fill="#1e1e2e" opacity="0.65"/>
  <!-- Sun/Moon -->
  <circle cx="450" cy="90" r="25" fill="url(#g1)" filter="url(#glow)" opacity="0.9"/>
  <!-- Neon lines -->
  <line x1="60" y1="320" x2="540" y2="320" stroke="#06b6d4" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="310" x2="500" y2="310" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <!-- Stars -->
  <circle cx="120" cy="60" r="1.5" fill="#06b6d4" opacity="0.6"/>
  <circle cx="280" cy="40" r="1" fill="#3b82f6" opacity="0.5"/>
  <circle cx="520" cy="55" r="1.5" fill="#06b6d4" opacity="0.4"/>
  <circle cx="350" cy="75" r="1" fill="#3b82f6" opacity="0.5"/>
  <circle cx="200" cy="90" r="1.5" fill="#06b6d4" opacity="0.3"/>
  <!-- Badge -->
  <rect x="210" y="330" width="180" height="32" rx="16" fill="#06b6d4" opacity="0.15"/>
  <text x="300" y="351" text-anchor="middle" fill="#06b6d4" font-family="system-ui,sans-serif" font-size="13" font-weight="600">TEXT → IMAGE</text>
</svg>
